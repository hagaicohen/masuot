<header class="header">
  <div class="header-left">
    <div class="logo">
      <img src="/logo.jpg" alt="לוגו" />
    </div>

    <div class="header-text">
      <div class="header-title">
        משואות יצחק
        <span class="header-sub-inline">סימולטור הכנסה פנויה</span>
      </div>

      <div class="header-sub" *ngIf="family() as f">
        משפחת {{ f.familyName }} · קוד תקציב {{ f.budgetCode }}
      </div>
      <div class="header-sub" *ngIf="!family() as f">
        משפחת  · קוד תקציב 
      </div>
    </div>
  </div>

  <button class="btn-logout" (click)="auth.logout()">↺ יציאה</button>
</header>
